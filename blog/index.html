<!DOCTYPE html>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #09090e 0%, #171236 40%, #2a0b36 100%);
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;

        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.6), 0 0 20px rgba(138,43,226,0.1);
        }

        .gradient-text {
            background: linear-gradient(to right, #818cf8, #e879f9, #818cf8);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 4s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
